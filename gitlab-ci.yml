stages:
  - build
  - deploy_gcp

build_images:
  stage: build
  image: docker:20.10.16

  services:
    - docker:20.10.16-dind
  
  variables: 
    DOCKER_TLS_CERTDIR: "/certs"

  before_script:
    - docker login -u $USERNAME -p $PASSWORD

  script: 
    - docker build -t luigiizzo4/app-cicd-projeto-dio:1.0 -f app/. 
    - docker push luigiizzo4/app-cicd-projeto-dio:1.0

deploy_gcp:

  stage: deploy_gcp

  before_script:
    - chmod 400 $SSH_KEY
  
  script:
      - ssh -o StrictHostKeyChecking=no -i $SSH_KEY gcp@$SSH_SERVER "sudo rm -Rf ./app-cicd-projeto-dio/ && sudo git clone https://gitlab.com/luigiizzo4/app-cicd-projeto-dio.git && cd app-cicd-projeto-dio && sudo chmod +x ./script.sh && ./script.sh"
